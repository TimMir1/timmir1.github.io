<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксклюзивные Овальные Часы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --clock-color: #316a73;
        }
        
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #d1d5db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Реалистичный корпус с эффектом металла и фаской */
        .clock-casing {
            background-color: var(--clock-color);
            box-shadow: 
                /* Внешняя тень */
                20px 20px 60px rgba(0, 0, 0, 0.2),
                -5px -5px 20px rgba(255, 255, 255, 0.5),
                /* Эффект фаски/объема */
                inset 2px 2px 5px rgba(255, 255, 255, 0.2),
                inset -2px -2px 5px rgba(0, 0, 0, 0.3);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Циферблат с эффектом глубины */
        .clock-face {
            background: radial-gradient(circle at center, #ffffff 0%, #f0f0f0 100%);
            box-shadow: 
                inset 0 10px 20px rgba(0, 0, 0, 0.15),
                inset 0 -5px 10px rgba(255, 255, 255, 0.8),
                0 2px 5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Текстура циферблата (микро-сетка) */
        .clock-face::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-image: radial-gradient(#000 0.5px, transparent 0.5px);
            background-size: 10px 10px;
            opacity: 0.03;
            pointer-events: none;
        }

        .hand {
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .color-dot {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .color-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid transparent;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .color-dot.active::after {
            border-color: #2AABEE;
            transform: scale(1.1);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center gap-8 py-12 px-4 max-w-4xl w-full">
        
        <!-- Заголовок карточки -->
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-black text-gray-800 tracking-tighter uppercase font-['Orbitron']">МАТИН ТЫ КОГДА ЧАСЫ ЗАБЕРЕШЬ?</h1>
            <p class="text-gray-500 font-medium tracking-widest uppercase text-xs">МОЗГОЕБ, БЛДЬ</p>
        </div>

        <!-- Секция товара -->
        <div class="flex flex-col lg:flex-row items-center justify-center gap-12 w-full">
            
            <!-- Визуализация часов -->
            <div class="relative group">
                <div id="main-clock" class="clock-casing relative w-[360px] h-[200px] rounded-r-[100px] flex items-center p-[18px]">
                    <div class="clock-face relative w-full h-full rounded-[82px] ml-4 overflow-hidden">
                        <div class="face-elements w-full h-full relative font-['Orbitron']"></div>
                        
                        <!-- Стекло (блик) -->
                        <div class="absolute inset-0 pointer-events-none bg-linear-to-tr from-transparent via-white/10 to-white/20 z-20"></div>
                        
                        <!-- Стрелки -->
                        <div class="absolute top-1/2 left-1/2 w-0 h-0 z-30">
                            <div class="hand hour-hand absolute bg-[#1a1a1a] w-[5px] h-[48px] origin-bottom rounded-full" style="bottom: 0; left: -2.5px;"></div>
                            <div class="hand minute-hand absolute bg-[#333] w-[3px] h-[65px] origin-bottom rounded-full" style="bottom: 0; left: -1.5px;"></div>
                            <div class="hand second-hand absolute bg-[#e63946] w-[1.5px] h-[72px] origin-bottom rounded-full" style="bottom: 0; left: -0.75px;"></div>
                            <div class="absolute bg-[#111] w-[12px] h-[12px] rounded-full shadow-lg border border-white/20" style="top: -6px; left: -6px;"></div>
                        </div>
                    </div>
                </div>
                <!-- Тень под часами для реализма -->
                <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-[80%] h-4 bg-black/10 blur-xl rounded-full"></div>
            </div>

            <!-- Инфо-панель карточки -->
            <div class="glass-effect p-8 rounded-[2rem] shadow-xl w-full max-w-[380px] space-y-8">
                <div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-gray-900">28 900 ₽</span>
                        <span class="text-gray-400 line-through text-sm">36 000 ₽</span>
                    </div>
                    <p class="text-gray-600 text-sm mt-2 leading-relaxed">
                        Лимитированная серия в матовом корпусе. Японский механизм, бесшумный ход и футуристичный дизайн.
                    </p>
                </div>

                <!-- Выбор цвета -->
                <div class="space-y-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest font-['Orbitron']">Цвет корпуса</span>
                    <div id="color-picker" class="grid grid-cols-5 gap-3">
                        <button onclick="updateSettings('#316a73', this)" class="color-dot active w-10 h-10 rounded-full bg-[#316a73] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#c13034', this)" class="color-dot w-10 h-10 rounded-full bg-[#c13034] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#1a1a1a', this)" class="color-dot w-10 h-10 rounded-full bg-[#1a1a1a] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#2d3436', this)" class="color-dot w-10 h-10 rounded-full bg-[#2d3436] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#0984e3', this)" class="color-dot w-10 h-10 rounded-full bg-[#0984e3] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#6c5ce7', this)" class="color-dot w-10 h-10 rounded-full bg-[#6c5ce7] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#00b894', this)" class="color-dot w-10 h-10 rounded-full bg-[#00b894] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#fdcb6e', this)" class="color-dot w-10 h-10 rounded-full bg-[#fdcb6e] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#e17055', this)" class="color-dot w-10 h-10 rounded-full bg-[#e17055] border-2 border-white shadow-sm"></button>
                        <button onclick="updateSettings('#b2bec3', this)" class="color-dot w-10 h-10 rounded-full bg-[#b2bec3] border-2 border-white shadow-sm"></button>
                    </div>
                </div>

                <!-- Кнопка действия -->
                <a href="https://t.me/+79779662521" target="_blank" class="flex items-center justify-center gap-3 bg-gray-900 hover:bg-black text-white py-5 rounded-2xl transition-all shadow-lg hover:shadow-black/20 font-bold text-lg active:scale-95">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.494 8.171l-1.891 8.916c-.143.644-.522.802-1.062.5l-2.88-2.122-1.39 1.338c-.153.153-.282.282-.577.282l.207-2.936 5.344-4.828c.232-.207-.05-.322-.361-.115l-6.604 4.157-2.845-.89c-.618-.193-.63-.618.129-.915l11.116-4.284c.514-.193.964.114.759 1.02z"/></svg>
                    Купить в Telegram
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateSettings(color, btn) {
            document.documentElement.style.setProperty('--clock-color', color);
            
            // Обновление активного состояния кнопок
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            btn.classList.add('active');
        }

        function buildClockFaces() {
            const faces = document.querySelectorAll('.face-elements');
            faces.forEach(face => {
                const width = face.offsetWidth;
                const height = face.offsetHeight;
                const cx = width / 2;
                const cy = height / 2;

                const numbers = [12, 3, 6, 9];
                numbers.forEach(num => {
                    const angle = num * 30;
                    const rad = (angle - 90) * Math.PI / 180;
                    const rx = cx - 35; 
                    const ry = cy - 30;
                    const x = cx + rx * Math.cos(rad);
                    const y = cy + ry * Math.sin(rad);

                    const numEl = document.createElement('div');
                    numEl.innerText = num;
                    numEl.className = 'absolute text-3xl text-gray-800 font-black tracking-tighter';
                    numEl.style.left = `${x}px`;
                    numEl.style.top = `${y}px`;
                    numEl.style.transform = 'translate(-50%, -50%)';
                    face.appendChild(numEl);
                });

                for (let i = 1; i <= 12; i++) {
                    if (i % 3 === 0) continue;
                    const angle = i * 30;
                    const rad = (angle - 90) * Math.PI / 180;
                    const rx = cx - 15;
                    const ry = cy - 15;
                    const x = cx + rx * Math.cos(rad);
                    const y = cy + ry * Math.sin(rad);

                    const tick = document.createElement('div');
                    tick.className = 'absolute w-[2px] h-[12px] bg-gray-400/50 rounded-full';
                    tick.style.left = `${x}px`;
                    tick.style.top = `${y}px`;
                    tick.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
                    face.appendChild(tick);
                }
            });
        }

        function updateClocks() {
            const now = new Date();
            const ms = now.getMilliseconds();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            const sAngle = (s + ms / 1000) * 6;
            const mAngle = m * 6 + (s * 0.1);
            const hAngle = (h % 12) * 30 + (m * 0.5);

            document.querySelector('.hour-hand').style.transform = `rotate(${hAngle}deg)`;
            document.querySelector('.minute-hand').style.transform = `rotate(${mAngle}deg)`;
            document.querySelector('.second-hand').style.transform = `rotate(${sAngle}deg)`;

            requestAnimationFrame(updateClocks);
        }

        window.onload = () => {
            buildClockFaces();
            updateClocks();
        };
    </script>
</body>
</html>
